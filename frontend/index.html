<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AWS ATS Resume Score Checker</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>AWS ATS Resume Score Checker</h1>

    <div class="card">

        <label>📄 Upload Resume (PDF)</label>

        <input
            type="file"
            id="resume"
            accept=".pdf">

        <label>💼 Job Description</label>

        <textarea
            id="jd"
            rows="8"
            placeholder="Paste Job Description here..."></textarea>

        <button onclick="checkATS()">
            Analyze Resume
        </button>

    </div>

    <div id="loading" style="display:none; text-align:center; margin-top:20px;">

        <h2>⏳ Analyzing Resume...</h2>

    </div>

    <div id="result">

        <h2>ATS Score</h2>

        <h1 id="score">0%</h1>

        <h3 id="status"></h3>

        <div class="progress">

            <div id="progressBar"></div>

        </div>

        <h2>Resume Statistics</h2>

        <p id="analysis"></p>

        <div class="lists">

            <div>

                <h2>✅ Matched Skills</h2>

                <ul id="matched"></ul>

            </div>

            <div>

                <h2>❌ Missing Skills</h2>

                <ul id="missing"></ul>

            </div>

        </div>

        <h2>💡 Suggestions</h2>

        <ul id="suggestions"></ul>

    </div>

</div>

<!-- Load JavaScript -->
<script src="script.js"></script>

</body>
</html>
